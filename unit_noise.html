<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雜訊與 SNR 實驗 · noise</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f4f7f8;--paper-2:#ffffff;--ink:#0e2630;--ink-soft:#3f5a63;--line:#d5e0e3;
    --phthalo:#0b7ba6;--phthalo-deep:#075975;--phthalo-wash:#e2eff4;
    --copper:#b3703f;--tri:#c98a3f;--tri-line:#c98a3f;--tri-wash:#f6ecd6;
    --yes:#0d8a63;--yes-wash:#dcf1e9;--no:#a8792a;--no-wash:#f6ecd6;--miss:#c0464a;
    --shadow:0 1px 2px rgba(14,38,48,.06),0 8px 30px rgba(14,38,48,.07);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:"Noto Sans TC","Space Grotesk",system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:960px;margin:0 auto;padding:clamp(18px,4vw,44px) clamp(14px,4vw,34px) 72px}
  .mono{font-family:"IBM Plex Mono",monospace;font-variant-numeric:tabular-nums}

  /* unit nav */
  .unitnav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:22px}
  .unitnav a{font-family:"IBM Plex Mono",monospace;font-size:12px;text-decoration:none;
    color:var(--ink-soft);border:1px solid var(--line);background:var(--paper-2);
    padding:6px 11px;border-radius:999px;display:inline-flex;align-items:center;gap:6px}
  .unitnav a .i{width:16px;height:16px;border-radius:50%;background:var(--phthalo-wash);
    color:var(--phthalo-deep);font-weight:600;display:grid;place-items:center;font-size:10px}
  .unitnav a.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .unitnav a.active .i{background:var(--copper);color:#fff}

  .eyebrow{font-family:"IBM Plex Mono",monospace;font-size:12px;letter-spacing:.16em;
    text-transform:uppercase;color:var(--phthalo-deep);display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .eyebrow::before{content:"";width:24px;height:2px;background:var(--copper)}
  h1{font-family:"Space Grotesk","Noto Sans TC",sans-serif;font-weight:700;
    font-size:clamp(24px,4.2vw,36px);line-height:1.12;margin:0 0 10px;letter-spacing:-.01em}
  h1 em{font-style:normal;color:var(--phthalo)}
  .intro{font-size:clamp(14px,2vw,16px);color:var(--ink-soft);max-width:64ch;margin:0 0 24px}

  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:0 0 16px}
  .btn{font-family:"IBM Plex Mono",monospace;font-size:13.5px;border:1px solid var(--line);
    background:var(--paper-2);color:var(--ink);padding:10px 16px;border-radius:10px;cursor:pointer;
    transition:all .15s;display:inline-flex;align-items:center;gap:8px}
  .btn:hover{border-color:var(--phthalo);color:var(--phthalo-deep)}
  .btn.primary{background:var(--phthalo);color:#fff;border-color:var(--phthalo)}
  .btn.primary:hover{background:var(--phthalo-deep);color:#fff}
  .btn.sm{padding:5px 12px;font-size:12px;border-radius:8px}
  .drop{border:1.5px dashed var(--line);border-radius:10px;padding:10px 16px;font-size:13px;
    color:var(--ink-soft);flex:1;min-width:180px;text-align:center;transition:all .15s}
  .drop.over{border-color:var(--phthalo);background:var(--phthalo-wash);color:var(--phthalo-deep)}
  .fname{font-family:"IBM Plex Mono",monospace;font-size:12.5px;color:var(--phthalo-deep)}
  .hidden{display:none}

  /* preprocessing panel */
  .calib{display:flex;flex-wrap:wrap;align-items:center;gap:12px 18px;padding:16px 18px;
    background:var(--paper-2);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);margin-bottom:16px}
  .calib-row{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--ink-soft)}
  .calib-row label{font-weight:500;color:var(--ink);white-space:nowrap}
  .calib input[type=range]{accent-color:var(--phthalo);width:150px;height:4px}
  .calval{font-family:"IBM Plex Mono",monospace;font-weight:600;color:var(--phthalo-deep);min-width:42px;text-align:right}
  .unit{font-size:11px;color:var(--ink-soft)}
  .calhint{font-size:12.5px;color:var(--copper);flex-basis:100%;margin-top:2px}
  .calhint.warn{color:var(--miss);font-weight:500}

  /* verdict */
  .verdict{background:var(--paper-2);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:20px 22px;margin-bottom:16px}
  .v-head{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:14px}
  .v-badge{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:15px;padding:8px 16px;border-radius:999px}
  .v-badge.cupc{background:var(--phthalo);color:#fff}
  .v-badge.tri{background:var(--tri-line);color:#fff}
  .v-badge.none{background:var(--no-wash);color:var(--no)}
  .v-sub{font-size:14px;color:var(--ink-soft)}
  .fourset{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:6px}
  @media(max-width:520px){.fourset{grid-template-columns:repeat(2,1fr)}}
  .chip{border:1px solid var(--line);border-radius:9px;padding:8px 6px;text-align:center;font-family:"IBM Plex Mono",monospace;font-size:13px}
  .chip .cm{font-weight:600;font-size:15px}
  .chip .st{font-size:11px;margin-top:2px}
  .chip.on{border-color:var(--yes);background:var(--yes-wash)}
  .chip.on .st{color:var(--yes)}
  .chip.off{border-color:var(--miss);background:#fbe9ea}
  .chip.off .st{color:var(--miss)}
  .matchbars{display:flex;gap:18px;margin-top:14px;flex-wrap:wrap}
  .mb{font-size:13px}
  .mb .lab{display:flex;align-items:center;gap:7px;margin-bottom:5px;font-weight:500}
  .mb .sw{width:12px;height:12px;border-radius:3px}
  .mb .sw.cupc{background:var(--phthalo)}.mb .sw.tri{background:var(--tri-line)}
  .mb .n{font-family:"IBM Plex Mono",monospace;font-size:20px;font-weight:600}
  .mb .d{color:var(--ink-soft);font-size:12px}

  /* plot */
  .plot-card{background:var(--paper-2);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:18px 18px 12px}
  .toggles{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px;align-items:center}
  .toggles .lbl{font-size:12.5px;color:var(--ink-soft);margin-right:2px}
  .tg{font-family:"IBM Plex Mono",monospace;font-size:12.5px;border:1px solid var(--line);
    background:var(--paper);color:var(--ink);padding:6px 12px;border-radius:999px;cursor:pointer;
    display:inline-flex;align-items:center;gap:7px;transition:all .15s}
  .tg .sw{width:10px;height:10px;border-radius:2px;opacity:.35}
  .tg[aria-pressed="true"]{background:var(--ink);color:#fff;border-color:var(--ink)}
  .tg[aria-pressed="true"] .sw{opacity:1}
  .tg .sw.cupc{background:var(--phthalo)}.tg .sw.tri{background:var(--tri-line)}.tg .sw.pk{background:var(--copper)}
  svg#plot{display:block;width:100%;height:auto}
  .trace{fill:none;stroke:var(--phthalo-deep);stroke-width:1.6;stroke-linejoin:round}
  .axis{stroke:var(--line);stroke-width:1}.grid{stroke:#eef3f4;stroke-width:1}
  .axis-txt{font-family:"IBM Plex Mono",monospace;font-size:10px;fill:var(--ink-soft)}
  .ref-cupc{stroke:var(--phthalo);stroke-width:1;opacity:.30}
  .ref-cupc.matched{opacity:.85;stroke-width:1.4}
  .ref-tri{stroke:var(--tri-line);stroke-width:1;opacity:.30;stroke-dasharray:3 3}
  .ref-tri.matched{opacity:.9;stroke-width:1.4;stroke-dasharray:none}
  .pk-dot{fill:var(--copper)}
  .pk-txt{font-family:"IBM Plex Mono",monospace;font-size:9.5px;fill:var(--copper);text-anchor:middle}

  details.tbl{margin-top:16px;background:var(--paper-2);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  details.tbl summary{cursor:pointer;padding:14px 18px;font-family:"IBM Plex Mono",monospace;font-size:13px;color:var(--phthalo-deep);font-weight:600;list-style:none}
  details.tbl summary::-webkit-details-marker{display:none}
  details.tbl summary::before{content:"▸ ";color:var(--copper)}
  details.tbl[open] summary::before{content:"▾ "}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:8px 18px;border-top:1px solid var(--line)}
  th{font-family:"IBM Plex Mono",monospace;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);font-weight:600}
  td.mono{font-family:"IBM Plex Mono",monospace}
  .dl{margin:12px 18px 16px}

  .note{font-size:13px;color:var(--ink-soft);margin-top:22px;border-top:1px solid var(--line);padding-top:18px}
  .note b{color:var(--ink)}
  footer{margin-top:28px;font-size:12px;color:var(--ink-soft);font-family:"IBM Plex Mono",monospace}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
  :focus-visible{outline:2px solid var(--copper);outline-offset:2px;border-radius:4px}
</style>
</head>

  <h1>雜訊<em>怎麼讓找峰失準</em></h1>
  <p class="intro">這一頁只有一支滑桿:注入雜訊。以訊號最大值的百分比加入高斯雜訊(固定種子,拖動只放大同一組雜訊),模擬低 SNR。盯著判定卡的「偵測峰數」看它如何暴增。</p>

  
  <div class="calib"><div class="calib-row"><label>注入雜訊</label><input type="range" id="nzLevel" min="0" max="20" step="0.5" value="0"><span class="calval" id="nzLevelV">0.0</span><span class="unit">% 訊號</span></div><button class="btn sm" id="calReset">↺ 歸零</button><span class="calhint" id="calHint"></span></div>

  <div class="verdict" id="verdict"><div class="v-sub">載入中…</div></div>

  <div class="plot-card">
    <div class="toggles"><span class="lbl">疊圖:</span><button class="tg" id="tgCupc"><span class="sw cupc"></span>CuPc 參考峰</button><button class="tg" id="tgPk"><span class="sw pk"></span>偵測到的峰</button></div>
    <svg id="plot" viewBox="0 0 960 340" role="img" aria-label="拉曼光譜比對圖"></svg>
  </div>

  <details class="tbl">
    <summary>偵測峰清單與逐峰比對</summary>
    <div id="tblbody"></div>
    <div class="dl"><button class="btn sm" id="btnDl">⬇ 下載偵測峰 CSV</button></div>
  </details>

  <div class="note"><b>重點:</b>加雜訊時實際看到的是「過度偵測」——偵測峰數從 ~40 暴增到近百,峰清單與「數對幾顆」式比對變得不可信。反面同樣重要:強又分得開的診斷峰對雜訊很耐受,危險的是弱峰與過度解讀。這也是為何實務會先平滑再找峰。</div>

function parseCSV(text){
  var out=[],lines=text.split(/\r?\n/);
  for(var i=0;i<lines.length;i++){var ln=lines[i].trim();if(!ln)continue;
    var p=ln.split(/[,;\t ]+/);if(p.length<2)continue;
    var a=parseFloat(p[0]),b=parseFloat(p[1]);if(isFinite(a)&&isFinite(b))out.push([a,b]);}
  out.sort(function(p,q){return p[0]-q[0];});return out;
}
function polyfit(x,y,order){
  var n=x.length,m=order+1,xmin=x[0],xmax=x[n-1],span=(xmax-xmin)||1,xn=new Array(n);
  for(var i=0;i<n;i++)xn[i]=2*(x[i]-xmin)/span-1;
  var A=[],B=[];for(var r=0;r<m;r++){A.push(new Array(m).fill(0));B.push(0);}
  var pw=new Array(2*m-1).fill(0);
  for(i=0;i<n;i++){var p=1,ps=[];for(var k=0;k<2*m-1;k++){pw[k]+=p;if(k<m)ps.push(p);p*=xn[i];}for(r=0;r<m;r++)B[r]+=ps[r]*y[i];}
  for(r=0;r<m;r++)for(var c=0;c<m;c++)A[r][c]=pw[r+c];
  return {coef:gauss(A,B),xmin:xmin,span:span};
}
function gauss(A,b){var n=b.length;
  for(var i=0;i<n;i++){var mx=i;for(var r=i+1;r<n;r++)if(Math.abs(A[r][i])>Math.abs(A[mx][i]))mx=r;
    var t=A[i];A[i]=A[mx];A[mx]=t;var tb=b[i];b[i]=b[mx];b[mx]=tb;if(Math.abs(A[i][i])<1e-12)A[i][i]=1e-12;
    for(r=i+1;r<n;r++){var f=A[r][i]/A[i][i];for(var c=i;c<n;c++)A[r][c]-=f*A[i][c];b[r]-=f*b[i];}}
  var x=new Array(n);for(i=n-1;i>=0;i--){var s=b[i];for(var c2=i+1;c2<n;c2++)s-=A[i][c2]*x[c2];x[i]=s/A[i][i];}return x;
}
function polyval(fit,x){var xn=2*(x-fit.xmin)/fit.span-1,p=1,s=0;for(var k=0;k<fit.coef.length;k++){s+=fit.coef[k]*p;p*=xn;}return s;}
function modpoly(x,y,order,it){var yw=y.slice();for(var t=0;t<it;t++){var fit=polyfit(x,yw,order);for(var i=0;i<x.length;i++){var f=polyval(fit,x[i]);if(f<yw[i])yw[i]=f;}}var f2=polyfit(x,yw,order);return x.map(function(xi){return polyval(f2,xi);});}
function pickPeaks(x,y,minH,minDist){var cand=[];for(var i=1;i<x.length-1;i++){if(y[i]>=y[i-1]&&y[i]>y[i+1]&&y[i]>=minH)cand.push(i);}cand.sort(function(a,b){return y[b]-y[a];});var acc=[];for(var c=0;c<cand.length;c++){var xi=x[cand[c]],ok=true;for(var k=0;k<acc.length;k++){if(Math.abs(x[acc[k]]-xi)<minDist){ok=false;break;}}if(ok)acc.push(cand[c]);}acc.sort(function(a,b){return x[a]-x[b];});return acc.map(function(i){return {cm:x[i],I:y[i]};});}

}
function nearest(cm,refset){var best=1e9,bi=-1;for(var i=0;i<refset.length;i++){var d=Math.abs(refset[i]-cm);if(d<best){best=d;bi=i;}}return {d:best,ref:refset[bi]};}
function matchRefs(refset){var hit=0,map={};for(var i=0;i<refset.length;i++){var r=refset[i],found=null;for(var j=0;j<STATE.peaks.length;j++){if(Math.abs(STATE.peaks[j].cm-r)<=TOL){if(!found||Math.abs(STATE.peaks[j].cm-r)<Math.abs(found.cm-r))found=STATE.peaks[j];}}if(found){hit++;map[r]=found;}else map[r]=null;}return {hit:hit,total:refset.length,map:map};}

function matchAndRender(){
  var mc=matchRefs(REF_CUPC),mt=matchRefs(REF_TRI);
  var four=CUPC_FOUR.map(function(r){var f=null;for(var j=0;j<STATE.peaks.length;j++)if(Math.abs(STATE.peaks[j].cm-r)<=TOL)f=STATE.peaks[j];return {ref:r,ok:!!f,obs:f};});
  var fourOK=four.filter(function(f){return f.ok;}).length;
  var vb,vt,cls;
  if(fourOK===4){cls="cupc";vb="銅酞菁 CuPc";vt="四峰組完整,判定為酞菁藍(PB15 家族)。";}
  else if(mt.hit>=5&&fourOK<=1){cls="tri";vb="三芳基甲烷";vt="缺 pyrrole 四峰組、芳香環模態為主,較像亮藍 FCF/Erioglaucine 型。";}
  else if(fourOK>=3){cls="cupc";vb="銅酞菁 CuPc(部分)";vt="四峰組到 "+fourOK+"/4,傾向 CuPc,建議確認訊噪比或校正。";}
  else {cls="none";vb="無法判定";vt="兩套指紋都不夠吻合;檢查波數校正、基線或訊噪比。";}
  var fourHTML=four.map(function(f){return '<div class="chip '+(f.ok?'on':'off')+'"><div class="cm">'+f.ref+'</div><div class="st">'+(f.ok?('✓ '+f.obs.cm.toFixed(0)):'✗ 缺')+'</div></div>';}).join('');
  document.getElementById('verdict').innerHTML=
    '<div class="v-head"><span class="v-badge '+cls+'">'+vb+'</span><span class="v-sub">'+vt+'</span></div>'+
    '<div class="v-sub" style="margin-bottom:6px">CuPc 診斷四峰組(748 / 1337 / 1450 / 1526):</div>'+
    '<div class="fourset">'+fourHTML+'</div>'+
    '<div class="matchbars">'+
      '<div class="mb"><div class="lab"><span class="sw cupc"></span>CuPc 全套</div><span class="n">'+mc.hit+'</span><span class="d"> / '+mc.total+' 峰</span></div>'+
      '<div class="mb"><div class="lab"><span class="sw tri"></span>三芳基甲烷</div><span class="n">'+mt.hit+'</span><span class="d"> / '+mt.total+' 峰</span></div>'+
      '<div class="mb"><div class="lab">偵測峰數</div><span class="n">'+STATE.peaks.length+'</span></div>'+
    '</div>';
  drawPlot(mc,mt);drawTable(mc,mt);
}

var VW=960,VH=340,ML=44,MR=16,MT=20,MB=34;
function X0(){return 150;}function X1(){return 1750;}
function px(cm){return ML+(cm-X0())/(X1()-X0())*(VW-ML-MR);}
function py(v){return VH-MB-v*(VH-MB-MT);}
var show=Object.assign({cupc:true,tri:true,pk:true,base:false}, CONFIG.show||{});
function drawPlot(mc,mt){
  var s='';
  for(var g=200;g<=1700;g+=300){s+='<line class="grid" x1="'+px(g)+'" y1="'+MT+'" x2="'+px(g)+'" y2="'+(VH-MB)+'"></line>';s+='<text class="axis-txt" x="'+px(g)+'" y="'+(VH-MB+14)+'" text-anchor="middle">'+g+'</text>';}
  s+='<line class="axis" x1="'+ML+'" y1="'+(VH-MB)+'" x2="'+(VW-MR)+'" y2="'+(VH-MB)+'"></line>';
  s+='<text class="axis-txt" x="'+(VW/2)+'" y="'+(VH-4)+'" text-anchor="middle">Raman shift (cm⁻¹)</text>';
  if(show.base){
    var dbl='',dtr='';
    for(var i=0;i<STATE.x.length;i++){if(STATE.x[i]<X0()||STATE.x[i]>X1())continue;var rv=STATE.rawY[i]/STATE.rawMax,bv=STATE.base[i]/STATE.rawMax;dtr+=(dtr?'L':'M')+px(STATE.x[i]).toFixed(1)+' '+py(rv).toFixed(1)+' ';dbl+=(dbl?'L':'M')+px(STATE.x[i]).toFixed(1)+' '+py(bv).toFixed(1)+' ';}
    s+='<path class="trace" style="stroke:var(--ink-soft);opacity:.55" d="'+dtr+'"></path>';
    s+='<path d="'+dbl+'" style="fill:none;stroke:var(--copper);stroke-width:2;stroke-dasharray:5 4"></path>';
    s+='<text class="axis-txt" x="'+(VW-MR)+'" y="'+(MT+4)+'" text-anchor="end" style="fill:var(--ink-soft)">灰=原始訊號 · 橙虛線=ModPoly 基線(order '+BL.order+' / iter '+BL.iters+')</text>';
    document.getElementById('plot').innerHTML=s;return;
  }
  if(show.cupc)REF_CUPC.forEach(function(r){var m=mc.map[r]?' matched':'';if(r<X0()||r>X1())return;s+='<line class="ref-cupc'+m+'" x1="'+px(r)+'" y1="'+MT+'" x2="'+px(r)+'" y2="'+(VH-MB)+'"></line>';});
  if(show.tri)REF_TRI.forEach(function(r){var m=mt.map[r]?' matched':'';if(r<X0()||r>X1())return;s+='<line class="ref-tri'+m+'" x1="'+px(r)+'" y1="'+MT+'" x2="'+px(r)+'" y2="'+(VH-MB)+'"></line>';});
  var d='';for(var i2=0;i2<STATE.x.length;i2++){if(STATE.x[i2]<X0()||STATE.x[i2]>X1())continue;d+=(d?'L':'M')+px(STATE.x[i2]).toFixed(1)+' '+py(STATE.y[i2]).toFixed(1)+' ';}
  s+='<path class="trace" d="'+d+'"></path>';
  if(show.pk){var top=STATE.peaks.slice().sort(function(a,b){return b.I-a.I;}).slice(0,12);top.forEach(function(p){if(p.cm<X0()||p.cm>X1())return;s+='<circle class="pk-dot" cx="'+px(p.cm)+'" cy="'+py(p.I)+'" r="3"></circle>';if(p.I>0.12)s+='<text class="pk-txt" x="'+px(p.cm)+'" y="'+(py(p.I)-6)+'">'+p.cm.toFixed(0)+'</text>';});}
  document.getElementById('plot').innerHTML=s;
}
function drawTable(mc,mt){
  var rows=STATE.peaks.slice().sort(function(a,b){return b.I-a.I;}).map(function(p){
    var c=nearest(p.cm,REF_CUPC),t=nearest(p.cm,REF_TRI);
    var cm=c.d<=TOL?('CuPc '+c.ref):'—',tm=t.d<=TOL?('Tri '+t.ref):'—';
    return '<tr><td class="mono">'+p.cm.toFixed(1)+'</td><td class="mono">'+p.I.toFixed(2)+'</td><td class="mono">'+cm+'</td><td class="mono">'+tm+'</td></tr>';}).join('');
  document.getElementById('tblbody').innerHTML='<table><thead><tr><th>峰 (cm⁻¹)</th><th>相對強度</th><th>CuPc(±10)</th><th>三芳基甲烷(±10)</th></tr></thead><tbody>'+rows+'</tbody></table>';
}

// ---------- calibration + baseline + noise state ----------
var RAW=null,CURNAME='example',CAL={offset:0,slope:0},BL={order:5,iters:24},NZ={level:0};
var NOISE=[],RAWMAX=1;
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return ((t^t>>>14)>>>0)/4294967296;};}
function genNoise(n,seed){var r=mulberry32(seed),out=new Array(n);for(var i=0;i<n;i+=2){var u=Math.max(r(),1e-9),v=r();var m=Math.sqrt(-2*Math.log(u));out[i]=m*Math.cos(2*Math.PI*v);if(i+1<n)out[i+1]=m*Math.sin(2*Math.PI*v);}return out;}
function recompute(){if(!RAW)return;var amp=NZ.level/100*RAWMAX;var d=RAW.map(function(p,i){return [p[0]*(1+CAL.slope/100)+CAL.offset,p[1]+amp*(NOISE[i]||0)];});process(d,CURNAME);}
function setData(raw,name){RAW=raw;CURNAME=name;RAWMAX=0;for(var i=0;i<raw.length;i++){if(raw[i][1]>RAWMAX)RAWMAX=raw[i][1];}NOISE=genNoise(raw.length,12345);recompute();}

function $(id){return document.getElementById(id);}
function bindControls(){
  var off=$('calOff'),sl=$('calSlope'),ord=$('blOrder'),itr=$('blIter'),nz=$('nzLevel'),hint=$('calHint');
  function upd(){
    if(off){CAL.offset=parseFloat(off.value);$('calOffV').textContent=CAL.offset.toFixed(1);}
    if(sl){CAL.slope=parseFloat(sl.value);$('calSlopeV').textContent=CAL.slope.toFixed(2);}
    if(ord){BL.order=parseInt(ord.value,10);$('blOrderV').textContent=BL.order;}
    if(itr){BL.iters=parseInt(itr.value,10);$('blIterV').textContent=BL.iters;}
    if(nz){NZ.level=parseFloat(nz.value);$('nzLevelV').textContent=NZ.level.toFixed(1);}
    if(hint){
      var msg=CONFIG.defaultHint||'',warn=false;
      if(nz&&NZ.level>=8){msg=CONFIG.noiseHint||msg;warn=true;}
      else if(ord&&BL.order<=2){msg=CONFIG.lowOrderHint||msg;warn=true;}
      else if(ord&&BL.order>=9){msg=CONFIG.highOrderHint||msg;warn=true;}
      else if(off&&(CAL.offset!==0||CAL.slope!==0)){msg=(CONFIG.driftHint||'').replace('%O',CAL.offset.toFixed(1)).replace('%S',CAL.slope.toFixed(2));warn=(Math.abs(CAL.offset)>TOL||Math.abs(CAL.slope)>0.5);}
      hint.textContent=msg;hint.className='calhint'+(warn?' warn':'');
    }
    recompute();
  }
  [off,sl,ord,itr,nz].forEach(function(el){if(el)el.addEventListener('input',upd);});
  var rst=$('calReset');
  if(rst)rst.addEventListener('click',function(){if(off)off.value=0;if(sl)sl.value=0;if(ord)ord.value=5;if(itr)itr.value=24;if(nz)nz.value=0;upd();});
  upd();
}
function bindToggles(){
  [['tgCupc','cupc'],['tgTri','tri'],['tgPk','pk'],['tgBase','base']].forEach(function(pair){
    var b=$(pair[0]);if(!b)return;
    b.setAttribute('aria-pressed', show[pair[1]]?'true':'false');
    b.addEventListener('click',function(){show[pair[1]]=!show[pair[1]];b.setAttribute('aria-pressed',show[pair[1]]);matchAndRender();});
  });
}
function bindFiles(){
  var fi=$('fileIn'),drop=$('drop'),ex=$('btnExample');
  function loadText(text,name){var raw=parseCSV(text);if($('fname'))$('fname').textContent=name;setData(raw,name);}
  if(fi)fi.addEventListener('change',function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(){loadText(r.result,f.name);};r.readAsText(f);});
  if(drop){['dragover','dragenter'].forEach(function(ev){drop.addEventListener(ev,function(e){e.preventDefault();drop.classList.add('over');});});['dragleave','drop'].forEach(function(ev){drop.addEventListener(ev,function(e){e.preventDefault();drop.classList.remove('over');});});drop.addEventListener('drop',function(e){var f=e.dataTransfer.files[0];if(!f)return;var r=new FileReader();r.onload=function(){loadText(r.result,f.name);};r.readAsText(f);});}
  if(ex)ex.addEventListener('click',function(){if($('fname'))$('fname').textContent='example (實測孔雀藍)';setData(EXAMPLE_DATA,'example');});
}
$('btnDl').addEventListener('click',function(){var csv='peak_cm-1,rel_intensity\n'+STATE.peaks.map(function(p){return p.cm.toFixed(1)+','+p.I.toFixed(3);}).join('\n');var a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download=(STATE.name||'spectrum')+'_peaks.csv';a.click();});
function renderError(){document.getElementById('verdict').innerHTML='<div class="v-sub" style="color:var(--miss)">資料點不足或格式無法解析——請確認 CSV 為兩欄:Raman shift, 強度。</div>';}

// init
bindControls();bindToggles();bindFiles();setData(EXAMPLE_DATA,'example');
</script>
